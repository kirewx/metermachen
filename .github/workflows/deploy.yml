name: Build & Publish Image

# Jeder Push auf main baut ein neues Image und schiebt es in die GitHub Container
# Registry (GHCR). Der Home-Server zieht es von dort — er baut selbst nichts.
# Zusätzlich deployt der Job "deploy" per SSH auf den NetCup-VPS
# (git pull + docker compose build, siehe docs/DEPLOY-netcup.md).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags und Labels bestimmen
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository ist "kirewx/metermachen" — GHCR verlangt Kleinschreibung,
          # was hier ohnehin erfüllt ist.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Nur amd64. Läuft der Home-Server auf einem Raspberry Pi o. Ä.,
          # hier "linux/amd64,linux/arm64" eintragen (Build dauert dann deutlich länger).
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    # Unabhängig vom GHCR-Build: der VPS baut selbst aus dem Git-Stand.
    steps:
      - name: Auf VPS deployen
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd /opt/metermachen
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
